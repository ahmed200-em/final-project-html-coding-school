<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up </title>
</head>

<body>
    <!--! this is the header -->
    <header align="middle">
        <h1>Sign Up page</h1>
    </header>
    <!--! this is the main -->
    <main>
        <!-- todo the hero section -->
        <section align="middle">
            <!-- form contain all info -->
            <from>
                <fieldset>
                    <legend><b>Registration Info</b></legend>
                    <br>
                    <label for="name">Name :</label>
                    <input type="text"><br><br>
                    <label for="email">Email :</label>
                    <input type="email"><br><br>
                    <label for="psswrd">Confirm Password :</label>
                    <input type="password"><br><br>
                    <label for="psswrd">Password :</label>
                    <input type="password"><br><br>
                    <label for="age">Age :</label>
                    <input type="number"><br><br>
                    <label for="birth">Date of Birth :</label>
                    <input type="date"><br><br>
                    <label for="gender">Select your gender :</label>
                    <input type="radio" name="gender">
                    <label for="male">Male</label>
                    <input type="radio" name="gender">
                    <label for="female">Female</label>
                    <input type="radio" name="gender">
                    <label for="other">Other</label>
                    <br><br>
                    <label for="skills">Select Your Skills :</label>
                    <input type="checkbox" name="html" id="html">
                    <label for="html">HTML</label>
                    <input type="checkbox" name="" id="">
                    <label for="css">CSS</label>
                    <input type="checkbox" name="" id="">
                    <label for="js">JS</label><br><br>
                    <label for="from">Where are you from :</label>
                    <select>
                        <option value="">Morocco</option>
                        <option value="">USA</option>
                        <option value="">CANADA</option>
                    </select>
                    <br><br>
                    <label for="image">Uplade Your Picture :</label>
                    <input type="file" name="" id="">
                    <br><br>
                    <button>Sign In</button>
                    <button>Login</button>
                </fieldset>
                <br>
                <!-- todo: this for feedback message -->
                <fieldset>
                    <legend><b>Give us Your feedback</b></legend>
                    <textarea name="" id=""></textarea>
                </fieldset>
            </from>
        </section>
    </main>
    <!--todo: and this is the footer -->
    <footer align="center">
        <p>Go back &nbsp;<a href="index.html">Home</a></p>
    </footer>
</body>

</html>
